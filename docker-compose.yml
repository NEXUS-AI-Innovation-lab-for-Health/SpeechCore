services:

  # ─── Ollama (LLM) ────────────────────────────────────
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Pull Mistral au premier lancement ───────────────
  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: sh -c "ollama pull mistral"
    restart: "no"

  # ─── API Génération de requêtes (port 8000) ──────────
  api-generation:
    build:
      context: ./API_generation_requetes
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: mistral
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ─── API Complétion de formulaire (port 8001) ────────
  api-completion:
    build:
      context: ./Completion_formulaire
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

# ─── Volumes ─────────────────────────────────────────
volumes:
  ollama_data: