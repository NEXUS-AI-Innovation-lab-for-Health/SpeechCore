services:
  # ─── Ollama (LLM) ────────────────────────────────────
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Pull Mistral au premier lancement ───────────────
  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: sh -c "ollama pull mistral"
    restart: "no"

  # ─── API REST Transcription (port 8000) ──────────────
  api_rest:
    image: ghcr.io/speechcore-sae/api-rest:latest
    container_name: transcription_rest
    ports:
      - "8000:8000"
    volumes:
      - vosk_models:/app/vosk-model-small-fr-0.22
      - vosk_models_grand:/app/vosk-model-fr-0.22
      - whisper_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── API WebSocket Transcription (port 8001) ─────────
  api_websocket:
    image: ghcr.io/speechcore-sae/api-websocket:latest
    container_name: transcription_websocket
    ports:
      - "8001:8000"
    volumes:
      - vosk_models:/app/vosk-model-small-fr-0.22
      - vosk_models_grand:/app/vosk-model-fr-0.22
      - whisper_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── API Génération de requêtes (port 8002) ──────────
  api-generation:
    image: ghcr.io/speechcore-sae/api-generation:latest
    ports:
      - "8002:8000"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: mistral
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ─── API Complétion de formulaire (port 8003) ────────
  api-completion:
    image: ghcr.io/speechcore-sae/api-completion:latest
    ports:
      - "8003:8001"
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

# ─── Volumes ─────────────────────────────────────────
volumes:
  ollama_data:
  vosk_models:
  vosk_models_grand:
  whisper_cache: